<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mapa Mental Interactivo</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/gojs/release/go.js"></script>
</head>

<body>

<header>
  <h1>Modelo Mental vs Modelo Conceptual</h1>
  <p>Interacción Hombre - Máquina</p>
</header>

<section class="controls">
  <button onclick="cargarMental()">Modelo Mental</button>
  <button onclick="cargarConceptual()">Modelo Conceptual</button>
</section>

<section id="myDiagramDiv"></section>

<footer>
  <p>Práctica GoJS - Curso UX</p>
</footer>

<script>
  const $ = go.GraphObject.make;

  // =========================
  // CONFIGURACIÓN DIAGRAMA
  // =========================
  const myDiagram = $(go.Diagram, "myDiagramDiv", {
    initialAutoScale: go.Diagram.Uniform,
    layout: $(go.TreeLayout, {
      angle: 90,
      layerSpacing: 50,
      nodeSpacing: 30
    }),
    "undoManager.isEnabled": true
  });

  // =========================
  // DISEÑO DE NODOS
  // =========================
  myDiagram.nodeTemplate =
    $(go.Node, "Auto",
      { width: 200 },

      $(go.Shape, "RoundedRectangle",
        {
          strokeWidth: 0,
          portId: "",
          fromLinkable: true,
          toLinkable: true
        },
        new go.Binding("fill", "color")
      ),

      $(go.TextBlock,
        {
          margin: 10,
          stroke: "white",
          font: "bold 13px sans-serif",
          wrap: go.TextBlock.WrapFit,
          textAlign: "center"
        },
        new go.Binding("text", "key")
      )
    );

  // =========================
  // DISEÑO DE ENLACES
  // =========================
  myDiagram.linkTemplate =
    $(go.Link,
      {
        routing: go.Link.Orthogonal,
        corner: 10
      },
      $(go.Shape, { strokeWidth: 2, stroke: "#888" }),
      $(go.Shape, { toArrow: "Standard", fill: "#888", stroke: null })
    );

  // =========================
  // MODELO MENTAL (Usuario)
  // =========================
  const modeloMental = [
    { key: "App Bancaria", color: "#5DADE2" },

    { key: "Abrir aplicación", parent: "App Bancaria", color: "#48C9B0" },
    { key: "Ingresar usuario", parent: "Abrir aplicación", color: "#48C9B0" },
    { key: "Ver saldo", parent: "Ingresar usuario", color: "#48C9B0" },
    { key: "Seleccionar acción", parent: "Ver saldo", color: "#48C9B0" },
    { key: "Transferir / Pagar", parent: "Seleccionar acción", color: "#48C9B0" },
    { key: "Confirmar operación", parent: "Transferir / Pagar", color: "#48C9B0" }
  ];

  // =========================
  // MODELO CONCEPTUAL (Sistema)
  // =========================
  const modeloConceptual = [
    { key: "Sistema Bancario", color: "#F5B041" },

    { key: "Autenticación", parent: "Sistema Bancario", color: "#F7DC6F" },
    { key: "Validación de credenciales", parent: "Autenticación", color: "#F7DC6F" },
    { key: "Consulta base de datos", parent: "Validación de credenciales", color: "#F7DC6F" },
    { key: "Obtención de saldo", parent: "Consulta base de datos", color: "#F7DC6F" },
    { key: "Procesamiento de transacción", parent: "Obtención de saldo", color: "#F7DC6F" },
    { key: "Conexión con banco destino", parent: "Procesamiento de transacción", color: "#F7DC6F" },
    { key: "Confirmación del sistema", parent: "Conexión con banco destino", color: "#F7DC6F" }
  ];

  // =========================
  // FUNCIONES DE CAMBIO
  // =========================
  function cargarMental() {
    myDiagram.model = new go.TreeModel(modeloMental);
  }

  function cargarConceptual() {
    myDiagram.model = new go.TreeModel(modeloConceptual);
  }

  // Carga inicial
  cargarMental();

</script>

</body>
</html>
